<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Claymorphism Elevation 1 (Subtle) */
        .clay-elevation-1 {
            background: #fdfdfd;
            box-shadow: 4px 4px 10px rgba(163, 177, 198, 0.3), 
                        inset 2px 2px 5px rgba(255, 255, 255, 0.7);
        }

        /* Claymorphism Elevation 2 (Standard) */
        .clay-elevation-2 {
            background: #fdfdfd;
            box-shadow: 8px 8px 20px rgba(163, 177, 198, 0.4), 
                        inset 4px 4px 10px rgba(255, 255, 255, 0.6);
        }

        /* Claymorphism Inset (Sunken Inputs) */
        .clay-inset {
            background: #e6e9ef;
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.5), 
                        inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }

        /* Claymorphism Primary Button */
        .clay-button-primary {
            background: #2f6192;
            color: #ffffff;
            box-shadow: 6px 6px 15px rgba(47, 97, 146, 0.3), 
                        inset 4px 4px 8px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .clay-button-primary:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.15);
            transform: scale(0.96);
        }

        .clay-back-btn:active {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.1);
            transform: scale(0.92);
        }

        /* Material Symbols Styling */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top AppBar (Simplified for Login) -->
<header class="w-full max-w-7xl mx-auto px-container-padding py-xs flex items-center justify-start h-16 fixed top-0 left-0 right-0 z-50">
<button class="clay-back-btn clay-elevation-1 w-10 h-10 rounded-full flex items-center justify-center text-primary transition-all duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</header>
<!-- Main Content Container -->
<main class="flex-1 w-full max-w-md mx-auto px-container-padding flex flex-col items-center justify-center py-xl">
<!-- Avatar/Icon Placeholder -->
<div class="clay-elevation-2 w-20 h-20 rounded-lg mb-lg flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[40px] fill-icon" style="font-variation-settings: 'FILL' 1;">phone_iphone</span>
</div>
<!-- Heading & Subtext -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Enter your mobile number</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">We'll send you an OTP to verify your account and keep it secure.</p>
</div>
<!-- Input Section -->
<div class="w-full space-y-md">
<div class="flex items-center gap-sm">
<!-- Country Code Chip -->
<div class="clay-elevation-2 h-14 px-md rounded-lg flex items-center justify-center font-label-md text-on-surface-variant min-w-[70px]">
                    +91
                </div>
<!-- Number Input -->
<div class="clay-inset h-14 flex-1 rounded-lg px-md flex items-center">
<input class="bg-transparent border-none outline-none focus:ring-0 w-full font-body-lg text-on-surface placeholder:text-outline" maxlength="10" placeholder="Mobile number" type="tel"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="clay-button-primary w-full h-14 rounded-full font-label-md text-label-md mt-lg flex items-center justify-center gap-xs">
<span>Get OTP</span>
<span class="material-symbols-outlined text-md">chevron_right</span>
</button>
</div>
<!-- Terms of Service -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-outline px-lg">
                By continuing, you agree to PayClay's <br/>
<a class="text-primary hover:underline transition-all" href="#">Terms of Service</a> &amp; 
                <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>
</p>
</footer>
</main>
<!-- Visual Background Element (Soft Blob) -->
<div class="fixed -bottom-32 -left-32 w-64 h-64 bg-primary-container opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-32 -right-32 w-80 h-80 bg-secondary-container opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<script>
        // Simple Interaction Logic
        const input = document.querySelector('input');
        const button = document.querySelector('.clay-button-primary');

        input.addEventListener('input', (e) => {
            // Basic numeric validation
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            
            // Visual feedback for complete number
            if(e.target.value.length === 10) {
                button.classList.add('scale-[1.02]');
                button.classList.replace('bg-primary', 'bg-surface-tint');
            } else {
                button.classList.remove('scale-[1.02]');
            }
        });

        // Add back action simulation
        document.querySelector('.clay-back-btn').addEventListener('click', () => {
            console.log('Navigating back...');
        });
    </script>
</body></html>
