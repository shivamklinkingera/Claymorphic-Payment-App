<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Level 2 Elevation - Standard Claymorphism */
        .clay-card {
            background: #ffffff;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        inset 8px 8px 12px rgba(255, 255, 255, 0.8),
                        inset -4px -4px 8px rgba(163, 177, 198, 0.1);
        }

        /* Level 3 Elevation - High Profile Objects */
        .clay-button-green {
            background: #006c4b; /* Secondary color from config */
            box-shadow: 12px 12px 24px rgba(0, 108, 75, 0.3), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .clay-button-green:active {
            transform: scale(0.96);
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Icon Float Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 3.5s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        /* Soft Glow Background */
        .clay-glow {
            filter: blur(60px);
            opacity: 0.4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex items-center justify-center min-h-screen p-container-padding">
<!-- Background Atmospheric Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container rounded-full clay-glow z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container rounded-full clay-glow z-0"></div>
<!-- Mobile Container (Simulating phone frame for demo, but responsive) -->
<main class="relative z-10 w-full max-w-[420px] h-full flex flex-col justify-between items-center space-y-lg py-xl">
<!-- Top: Illustration Section -->
<section class="w-full flex justify-center pt-md">
<div class="clay-card w-72 h-72 rounded-full relative flex items-center justify-center overflow-visible">
<!-- Inner illustration layer -->
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Central Phone Object -->
<div class="w-24 h-44 bg-surface-container-low rounded-lg clay-card flex items-center justify-center border-4 border-white/50">
<span class="material-symbols-outlined text-on-surface-variant scale-[2.5]" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
</div>
<!-- Orbiting Bill Icons (Semi-circle arrangement) -->
<!-- Lightbulb -->
<div class="absolute -top-4 -left-2 w-16 h-16 bg-tertiary-fixed rounded-full clay-card flex items-center justify-center animate-float">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<!-- TV -->
<div class="absolute -top-4 -right-2 w-16 h-16 bg-secondary-fixed rounded-full clay-card flex items-center justify-center animate-float-delayed">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">tv</span>
</div>
<!-- Water/Utility -->
<div class="absolute top-1/2 -right-12 -translate-y-1/2 w-14 h-14 bg-primary-fixed rounded-full clay-card flex items-center justify-center animate-float">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
</div>
</section>
<!-- Middle: Text Content Section -->
<section class="w-full text-center px-container-padding space-y-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                Pay Bills in Seconds
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed opacity-80">
                Recharge, pay electricity, water, gas bills — all from one place
            </p>
</section>
<!-- Bottom: Action Section -->
<section class="w-full px-container-padding flex flex-col items-center space-y-lg">
<!-- Dot Indicator -->
<div class="flex space-x-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>

</div>

<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<a class="font-label-md text-primary hover:opacity-70 transition-opacity" href="#">Already have an account? Log in</a>

<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('.clay-button-green');
            
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.95)';
            });

            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });

            // Gentle parallax movement for background glows based on mouse
            document.addEventListener('mousemove', (e) => {
                const glows = document.querySelectorAll('.clay-glow');
                const x = (e.clientX / window.innerWidth) * 20;
                const y = (e.clientY / window.innerHeight) * 20;
                
                glows.forEach((glow, index) => {
                    const factor = (index + 1) * 0.5;
                    glow.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
                });
            });
        });
    </script>
