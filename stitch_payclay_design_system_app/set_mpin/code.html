<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>PayClay - Set MPIN</title>

<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Claymorphism Elevation 2 (Standard) */
        .clay-elevation-2 {
            box-shadow: 
                8px 8px 20px rgba(163, 177, 198, 0.4), 
                inset 4px 4px 10px rgba(255, 255, 255, 0.6),
                inset -2px -2px 5px rgba(163, 177, 198, 0.1);
            transition: all 0.2s ease-in-out;
        }

        .clay-elevation-2:active {
            box-shadow: 
                inset 6px 6px 12px rgba(163, 177, 198, 0.5), 
                inset -4px -4px 10px rgba(255, 255, 255, 0.7);
            transform: scale(0.96);
        }

        /* Sunken Input Style */
        .clay-sunken {
            box-shadow: 
                inset 6px 6px 12px rgba(163, 177, 198, 0.4), 
                inset -6px -6px 12px rgba(255, 255, 255, 0.7);
        }

        /* Inflated Dot Style */
        .clay-inflated-dot {
            box-shadow: 
                4px 4px 8px rgba(163, 177, 198, 0.4), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top Navigation (Shell suppressed for Task-Focused screen, but keeping back arrow per request) -->
<header class="w-full flex items-center px-container-padding py-md bg-transparent">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 text-primary active:scale-95">
<span class="material-symbols-outlined text-headline-md" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding pb-xl">
<!-- Center Brand/Icon Section -->
<div class="flex flex-col items-center mb-lg">
<div class="w-24 h-24 rounded-full bg-surface-container flex items-center justify-center clay-elevation-2 mb-md">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="fingerprint" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Set your MPIN</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center opacity-80">Used to authorize payments</p>
</div>
<!-- Pin Indicators (4 Clay Dots) -->
<div class="flex gap-gutter mb-xl">
<!-- Filled Blue (Raised) -->
<div class="w-6 h-6 rounded-full bg-primary-container clay-inflated-dot"></div>
<!-- Filled Blue (Raised) -->
<div class="w-6 h-6 rounded-full bg-primary-container clay-inflated-dot"></div>
<!-- Empty (Sunken) -->
<div class="w-6 h-6 rounded-full bg-surface-dim clay-sunken"></div>
<!-- Empty (Sunken) -->
<div class="w-6 h-6 rounded-full bg-surface-dim clay-sunken"></div>
</div>
<!-- Keypad (3x4 Grid) -->
<div class="grid grid-cols-3 gap-md w-full max-w-xs mx-auto">
<!-- 1-9 -->
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">1</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">2</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">3</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">4</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">5</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">6</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">7</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">8</button>
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">9</button>
<!-- Empty Space -->
<div class="aspect-square"></div>
<!-- 0 -->
<button class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 font-display text-title-lg text-primary">0</button>
<!-- Backspace -->
<button aria-label="Backspace" class="aspect-square flex items-center justify-center bg-surface-container rounded-full clay-elevation-2 text-primary">
<span class="material-symbols-outlined text-headline-md" data-icon="backspace">backspace</span>
</button>
</div>
</main>
<!-- Bottom Action -->
<footer class="w-full flex flex-col items-center justify-center pb-xl pt-md">
<button class="flex items-center gap-xs text-primary font-label-md active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-md" data-icon="fingerprint" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<span class="font-label-md text-label-md">Use biometric instead</span>
</button>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('.clay-elevation-2').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.92)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.92)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simple haptic feedback simulation
        const keypadButtons = document.querySelectorAll('.grid button');
        keypadButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            });
        });
    </script>
</body></html>
