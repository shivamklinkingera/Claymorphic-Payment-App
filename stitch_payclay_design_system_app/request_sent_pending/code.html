<style>
      body {
        background-color: #F0EDE8;
        font-family: 'Nunito Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .clay-level-1 {
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,0.7);
      }

      .clay-level-2 {
        box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                    -10px -10px 20px rgba(255, 255, 255, 0.6),
                    inset 2px 2px 5px rgba(255, 255, 255, 0.3);
      }

      .clay-level-3 {
        box-shadow: 20px 20px 40px rgba(163, 177, 198, 0.4), 
                    -10px -10px 20px rgba(255, 255, 255, 0.6),
                    inset 4px 4px 10px rgba(255, 255, 255, 0.5);
      }

      .clay-button-amber {
        background-color: #f4bd67; /* tertiary-fixed-dim */
        box-shadow: 8px 8px 16px rgba(163, 177, 198, 0.3), 
                    -4px -4px 8px rgba(255, 255, 255, 0.6),
                    inset 2px 2px 4px rgba(255, 255, 255, 0.4);
      }

      .clay-button-amber:active {
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.1);
        transform: scale(0.98);
      }

      .clay-pill-amber {
        background-color: #ffddaf; /* tertiary-fixed */
        box-shadow: inset 2px 2px 4px rgba(0,0,0,0.05), 
                    inset -2px -2px 4px rgba(255,255,255,0.5);
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .float-animation {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-center p-container-padding overflow-hidden">
<!-- Success Content Area -->
<main class="w-full max-w-md flex flex-col items-center justify-center gap-lg fade-in">
<!-- Large Clay Circle Header -->
<div class="relative mb-md">
<div class="w-[100px] h-[100px] rounded-full flex items-center justify-center clay-level-3 float-animation" style="background-color: #f4bd67;">
<span class="material-symbols-outlined text-on-primary text-[48px]" style="font-variation-settings: 'FILL' 0, 'wght' 600;">
                    schedule
                </span>
</div>
<!-- Small ambient blob -->
<div class="absolute -z-10 w-32 h-32 bg-tertiary-fixed opacity-30 rounded-full blur-2xl -top-4 -left-4"></div>
</div>
<!-- Messaging -->
<div class="text-center space-y-sm">
<h1 class="font-headline-md text-[22px] font-bold" style="color: #c08f3e;">Request Sent!</h1>
<p class="font-body-md text-on-surface-variant opacity-80">Waiting for Amit Kumar to accept</p>
</div>
<!-- Summary Card -->
<div class="w-full bg-surface-container-lowest rounded-lg p-container-padding clay-level-2 flex flex-col gap-md items-center text-center">
<div class="space-y-xs">
<p class="font-label-sm text-on-surface-variant uppercase tracking-wider">Amount Requested</p>
<h2 class="font-headline-lg text-[28px] font-bold text-on-surface">₹1,000.00</h2>
</div>
<div class="h-[1px] w-full bg-outline-variant opacity-30"></div>
<div class="w-full flex justify-between items-center px-xs">
<div class="text-left">
<p class="font-label-sm text-on-surface-variant">Note</p>
<p class="font-title-lg text-body-md font-semibold text-on-surface">Rent for December</p>
</div>
<div class="clay-pill-amber px-sm py-xs rounded-full">
<span class="font-label-md text-on-tertiary-container">Pending</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col items-center gap-md pt-sm">
<!-- Remind Button -->
<button class="w-full py-md rounded-lg font-label-md clay-button-amber text-on-tertiary-fixed transition-all">
                Remind
            </button>
<!-- Cancel Button -->
<button class="font-label-md text-on-surface-variant hover:text-on-surface transition-colors active:scale-95">
                Cancel Request
            </button>
</div>
</main>
<!-- Footer Action -->
<footer class="mt-auto pb-lg fade-in" style="animation-delay: 0.2s;">
<button class="font-label-md text-primary font-bold hover:underline transition-all active:scale-95">
            Back to Home
        </button>
</footer>
<!-- Ambient Clay Blobs in background -->
<div class="fixed -top-20 -right-20 w-64 h-64 bg-secondary-fixed opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-40 -left-40 w-80 h-80 bg-primary-fixed opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Subtle ripple-like effect or feedback could be added here
                console.log('Action triggered:', this.innerText);
            });
        });

        // Add a subtle parallax movement to the blobs on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const blobs = document.querySelectorAll('.blur-3xl');
            blobs.forEach((blob, index) => {
                const factor = index === 0 ? 1 : -1;
                blob.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });
    </script>
</body></html>
