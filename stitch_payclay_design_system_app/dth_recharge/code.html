        /* Claymorphism Elevation 2 (Standard) */
        .clay-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 
                15px 15px 30px rgba(163, 177, 198, 0.4),
                inset 10px 10px 20px rgba(255, 255, 255, 0.6);
        }

        /* Claymorphism Inset (Sunken) for Inputs */
        .clay-input-container {
            background: #f4f2ff;
            border-radius: 1.5rem;
            box-shadow: 
                inset 6px 6px 12px rgba(163, 177, 198, 0.3),
                inset -6px -6px 12px rgba(255, 255, 255, 0.8);
        }

        /* Claymorphism Primary Button */
        .clay-btn-primary {
            background: #2f6192;
            color: white;
            box-shadow: 
                10px 10px 20px rgba(47, 97, 146, 0.3),
                inset 4px 4px 8px rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .clay-btn-primary:active {
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
        }

        /* Operator Chip Styles */
        .clay-chip {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 
                8px 8px 16px rgba(163, 177, 198, 0.2),
                inset 4px 4px 8px rgba(255, 255, 255, 0.8);
            transition: all 0.2s ease;
        }

        .clay-chip.active {
            background: #d1e4ff;
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.4);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .no-scrollbar::-webkit-scrollbar {

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('.clay-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.clay-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Simple animation for inputs on focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.boxShadow = 'inset 8px 8px 16px rgba(47, 97, 146, 0.2), inset -8px -8px 16px rgba(255, 255, 255, 0.9)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.boxShadow = '';
            });
        });
    </script>
