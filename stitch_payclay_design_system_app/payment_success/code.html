<style>
        body {

        }

        .clay-level-1 {
            box-shadow: 4px 4px 10px rgba(163, 177, 198, 0.3), inset 2px 2px 5px rgba(255, 255, 255, 0.5);
        }

        .clay-level-2 {
            box-shadow: 8px 8px 20px rgba(163, 177, 198, 0.4), inset 4px 4px 10px rgba(255, 255, 255, 0.6);
        }

        .clay-level-3 {
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), inset 6px 6px 12px rgba(255, 255, 255, 0.7);
        }

        .clay-inset {
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.5), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }

        .clay-button-active:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1) !important;
            transform: scale(0.96);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>

        document.querySelectorAll('.confetti').forEach(el => {
