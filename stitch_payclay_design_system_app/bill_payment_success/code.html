<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #F0EDE8; /* Requested warm off-white */

        }

        .material-symbols-outlined {

            background-color: #ffffff;
            border-radius: 2rem;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        inset 10px 10px 20px rgba(255, 255, 255, 0.6);
        }

        .clay-button-filled {
            box-shadow: 8px 8px 16px rgba(163, 177, 198, 0.4), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .clay-button-filled:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1);
            transform: scale(0.96);
        }

        .clay-button-outline {
            box-shadow: inset 4px 4px 8px rgba(255, 255, 255, 0.8),
                        inset -4px -4px 8px rgba(163, 177, 198, 0.2);
            border: 2px solid #727780;
            transition: all 0.2s ease;
        }

        .clay-button-outline:active {
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.05);
            transform: scale(0.96);
        }

        .clay-icon-circle {
            background: #006c4b;
            box-shadow: 10px 10px 20px rgba(163, 177, 198, 0.5), 
                        inset 8px 8px 16px rgba(255, 255, 255, 0.3);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .clay-sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            animation: sparkle 2s infinite ease-in-out;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
        }

        .clay-chip {
            background: #8af8c5;
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.8),
                        inset -2px -2px 4px rgba(0, 0, 0, 0.05);
        }

        .sunken-detail {
            background: #f4f2ff;
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.3),
                        inset -4px -4px 8px rgba(255, 255, 255, 0.7);
        }

<script>
        // Subtle micro-interaction for the sparkles
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.clay-card-l2');
            card.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = card.getBoundingClientRect();
                const x = (e.clientX - left) / width;
                const y = (e.clientY - top) / height;
                
                const moveX = (x - 0.5) * 10;
                const moveY = (y - 0.5) * 10;
                
                card.style.transform = `perspective(1000px) rotateX(${-moveY}deg) rotateY(${moveX}deg)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
                card.style.transition = 'transform 0.5s ease';
            });

            card.addEventListener('mouseenter', () => {
                card.style.transition = 'none';
            });
        });
    </script>
