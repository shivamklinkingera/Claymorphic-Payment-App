<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            color: #161a32;
            -webkit-tap-highlight-color: transparent;
        }

        /* Claymorphism Levels */
        .clay-raised {
            box-shadow: 
                8px 8px 20px rgba(163, 177, 198, 0.4), 
                inset 4px 4px 10px rgba(255, 255, 255, 0.6),
                inset -2px -2px 5px rgba(163, 177, 198, 0.2);
        }

        .clay-pressed {
            box-shadow: 
                inset 6px 6px 12px rgba(163, 177, 198, 0.5), 
                inset -4px -4px 10px rgba(255, 255, 255, 0.8);
            transform: scale(0.98);
        }

        .clay-sunken {
            background-color: rgba(0, 0, 0, 0.02);
            box-shadow: 
                inset 4px 4px 8px rgba(163, 177, 198, 0.4), 
                inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }

        .clay-button-green {
            background-color: #006c4b;
            box-shadow: 
                8px 8px 16px rgba(0, 108, 75, 0.3), 
                inset 4px 4px 10px rgba(255, 255, 255, 0.3);
        }

        .clay-button-green:active {
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Smooth Transition for Interactions */
        .transition-clay {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top App Bar (Contextual/Transactional: Back action) -->
<header class="w-full top-0 px-container-padding py-md bg-transparent">
<div class="flex items-center gap-md max-w-7xl mx-auto">
<button class="w-12 h-12 flex items-center justify-center rounded-full clay-raised bg-surface transition-clay active:clay-pressed">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">Request Money</h1>
</div>
</header>
<main class="flex-1 w-full max-w-7xl mx-auto px-container-padding pb-32">
<!-- Tabs Section -->
<div class="flex gap-md mt-lg mb-xl">
<button class="flex-1 py-md px-lg rounded-lg clay-pressed bg-primary-container text-on-primary-container font-label-md text-label-md transition-clay">
                From Contact
            </button>
<button class="flex-1 py-md px-lg rounded-lg clay-raised bg-surface text-on-surface-variant font-label-md text-label-md transition-clay active:clay-pressed">
                From QR
            </button>
</div>
<!-- Recipient Card Section -->
<div class="mb-xl">
<p class="font-label-md text-label-md text-on-surface-variant mb-sm px-unit">Request From</p>
<div class="clay-raised bg-surface rounded-lg p-md flex items-center justify-between border border-white/20">
<div class="flex items-center gap-md">
<!-- Clay Avatar -->
<div class="w-14 h-14 rounded-full clay-raised overflow-hidden border-2 border-white">
<img class="w-full h-full object-cover" data-alt="A friendly, high-quality portrait of a smiling South Asian man with short dark hair, wearing a professional yet casual shirt. The image features soft, claymorphic studio lighting with subtle blue-grey shadows and warm white highlights, fitting a modern finance app's bright and approachable aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBoT16qMja-qodssrz6L4HhvjfgxmXKMH0M4_15_Z3u7eh0D4I5_Ml7I55gtw67VcKGc4S5fdtiaCUd5wgxMJVuT6rFM4P18SI5WxlhCCh6iinOazSEVt0LenPG3p-bYqRsEhrzuac7KYNrmY5gokRPH9wT71dZaGggr-MwU5_zxbeIyB9xcOVRKVRaSO78f-LJ4ErVGGJbojHREZ3fVsiLHk2OlbS5hqpWhSVrB1iC1snTmBWBtcfaOilZIJM1_w-yI0JsZlHGY_Qw"/>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-on-surface">Amit Kumar</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant tracking-wider">87654XXXXX</p>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full clay-sunken text-on-surface-variant transition-clay active:scale-90">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<!-- Amount Input Section -->
<div class="mb-xl">
<p class="font-label-md text-label-md text-on-surface-variant mb-sm px-unit">Enter Amount</p>
<div class="clay-sunken rounded-lg p-xl flex flex-col items-center justify-center bg-surface/30">
<div class="flex items-baseline gap-xs">
<span class="font-headline-md text-headline-md text-primary opacity-60">₹</span>
<input class="bg-transparent border-none focus:ring-0 text-center font-display text-display text-primary w-full max-w-[240px] p-0" placeholder="0" type="text" value="1,000"/>
</div>
<div class="h-1 w-24 bg-primary/10 rounded-full mt-xs"></div>
</div>
</div>
<!-- Note Section -->
<div class="mb-xl">
<p class="font-label-md text-label-md text-on-surface-variant mb-sm px-unit">Add Note (Optional)</p>
<div class="relative">
<input class="w-full clay-sunken bg-white/20 border-none rounded-lg p-md font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-primary/20 transition-clay" placeholder="What is this for?" type="text" value="Rent for December"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/50">edit_note</span>
</div>
</div>
<!-- Visual Decorative Blob (Atmospheric) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-1/2 -right-32 w-80 h-80 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</main>
<!-- Bottom Action Button -->
<!-- Positioned fixed for mobile reachability with claymorphic elevation -->
<div class="fixed bottom-0 left-0 right-0 p-container-padding bg-gradient-to-t from-[#F0EDE8] via-[#F0EDE8]/90 to-transparent pt-lg">
<div class="max-w-7xl mx-auto">
<button class="w-full py-md rounded-full clay-button-green text-white font-headline-md text-headline-md transition-clay flex items-center justify-center gap-sm">
<span>Send Request</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('.clay-raised').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.classList.add('clay-pressed');
            });
            btn.addEventListener('touchend', () => {
                btn.classList.remove('clay-pressed');
            });
        });

        // Numeric input formatting logic (Simplified)
        const amountInput = document.querySelector('input[type="text"]');
        amountInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            if (val) {
                e.target.value = new Intl.NumberFormat('en-IN').format(val);
            }
        });
    </script>
</body></html>
