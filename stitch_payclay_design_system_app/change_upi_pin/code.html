<script>
        let currentPin = "";
        const dots = [
            document.getElementById('dot-1'),
            document.getElementById('dot-2'),
            document.getElementById('dot-3'),
            document.getElementById('dot-4')
        ];

        function tapKey(val) {
            if (val === 'clear') {
                if (currentPin.length > 0) {
                    currentPin = currentPin.slice(0, -1);
                }
            } else if (currentPin.length < 4) {
                currentPin += val;
                // Add physical feedback sensation
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.remove('dot-empty');
                    dot.classList.add('dot-filled');
                    dot.style.transform = "scale(1.2)";
                } else {
                    dot.classList.add('dot-empty');
                    dot.classList.remove('dot-filled');
                    dot.style.transform = "scale(1)";
                }
            });
        }

        function submitPin() {
            if (currentPin.length === 4) {
                // Mock success animation
                const main = document.querySelector('main');
                main.style.transition = "opacity 0.3s ease";
                main.style.opacity = "0.5";
                setTimeout(() => {
                    alert("Proceeding to Confirmation...");
                    currentPin = "";
                    updateDots();
                    main.style.opacity = "1";
                }, 400);
            }
        }
    </script>
