<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PayClay - Send &amp; Receive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#2f6192",
                    "on-primary-fixed": "#001d35",
                    "secondary-fixed-dim": "#6ddbaa",
                    "on-secondary-fixed": "#002114",
                    "secondary-fixed": "#8af8c5",
                    "on-tertiary": "#ffffff",
                    "outline": "#727780",
                    "on-surface": "#161a32",
                    "inverse-on-surface": "#f0efff",
                    "on-background": "#161a32",
                    "tertiary-fixed": "#ffddaf",
                    "surface-variant": "#dee0ff",
                    "tertiary": "#7f5604",
                    "background": "#fbf8ff",
                    "on-tertiary-fixed-variant": "#614000",
                    "on-primary-fixed-variant": "#0d4978",
                    "surface": "#fbf8ff",
                    "surface-container-highest": "#dee0ff",
                    "on-tertiary-container": "#432b00",
                    "surface-dim": "#d5d8f9",
                    "primary-fixed": "#d1e4ff",
                    "surface-container": "#ececff",
                    "on-primary-container": "#003256",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f4f2ff",
                    "inverse-surface": "#2b2f48",
                    "secondary": "#006c4b",
                    "on-tertiary-fixed": "#281800",
                    "on-error": "#ffffff",
                    "secondary-container": "#8af8c5",
                    "on-primary": "#ffffff",
                    "primary": "#2f6192",
                    "tertiary-container": "#c08f3e",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#9dcaff",
                    "tertiary-fixed-dim": "#f4bd67",
                    "inverse-primary": "#9dcaff",
                    "surface-bright": "#fbf8ff",
                    "primary-container": "#6c9bcf",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#42474f",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#007350",
                    "outline-variant": "#c2c7d0",
                    "on-secondary-fixed-variant": "#005137",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e5e6ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "lg": "32px",
                    "container-padding": "24px",
                    "gutter": "20px",
                    "xl": "48px",
                    "md": "20px",
                    "xs": "8px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Nunito Sans"],
                    "body-lg": ["Nunito Sans"],
                    "headline-md": ["Nunito Sans"],
                    "label-md": ["Nunito Sans"],
                    "body-md": ["Nunito Sans"],
                    "display": ["Nunito Sans"],
                    "label-sm": ["Nunito Sans"],
                    "headline-lg": ["Nunito Sans"],
                    "title-lg": ["Nunito Sans"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            overflow: hidden;
        }

        .clay-container-level-2 {
            background-color: #fbf8ff;
            border-radius: 3rem;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        inset 8px 8px 16px rgba(255, 255, 255, 0.7);
        }

        .clay-button-primary {
            background-color: #2f6192;
            color: #ffffff;
            border-radius: 9999px;
            box-shadow: 8px 8px 20px rgba(163, 177, 198, 0.5), 
                        inset 4px 4px 8px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .clay-button-primary:active {
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
        }

        .clay-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dee0ff;
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.5);
            transition: all 0.3s ease;
        }

        .clay-dot.active {
            background: #2f6192;
            width: 28px;
            border-radius: 8px;
            box-shadow: 4px 4px 8px rgba(47, 97, 146, 0.3),
                        inset 2px 2px 4px rgba(255, 255, 255, 0.4);
        }

        .floating-rupee {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .phone-clay {
            box-shadow: 12px 12px 24px rgba(163, 177, 198, 0.4), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.8);
        }

        .arrow-flow {
            stroke-dasharray: 100;
            animation: dash 2s linear infinite;
        }

        @keyframes dash {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-center p-container-padding">
<!-- Top Navigation Bar (Suppressed but logic placeholder) -->
<header class="fixed top-0 w-full px-container-padding py-md flex justify-between items-center">
<h1 class="font-display text-headline-md text-primary">PayClay</h1>
</header>
<main class="flex flex-col items-center w-full max-w-md gap-xl mt-xl">
<!-- Top: Clay Illustration level 2 Container -->
<div class="clay-container-level-2 w-full aspect-square flex flex-col items-center justify-center p-lg relative overflow-hidden">
<!-- Background Blob -->
<div class="absolute -top-10 -right-10 w-48 h-48 bg-primary-container opacity-20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-10 -left-10 w-48 h-48 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<div class="relative flex items-center justify-between w-full max-w-[280px] h-full">
<!-- Left Phone -->
<div class="phone-clay w-24 h-48 bg-surface border-4 border-white/50 rounded-xl relative flex flex-col items-center pt-xs overflow-hidden">
<div class="w-10 h-1.5 bg-surface-variant rounded-full mb-xs"></div>
<div class="w-16 h-28 bg-surface-container-low rounded-lg p-xs flex flex-col gap-xs items-center justify-center">
<span class="material-symbols-outlined text-primary text-[32px]">upload</span>
</div>
</div>
<!-- Central Animation Area -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<div class="relative w-full flex justify-center">
<svg class="overflow-visible" height="40" viewbox="0 0 120 40" width="120">
<path class="arrow-flow" d="M 0 20 Q 60 0 120 20" fill="none" opacity="0.3" stroke="#2f6192" stroke-linecap="round" stroke-width="3"></path>
<path class="arrow-flow" d="M 120 20 Q 60 40 0 20" fill="none" opacity="0.3" stroke="#006c4b" stroke-linecap="round" stroke-width="3"></path>
</svg>
<!-- Floating Rupee 1 -->
<div class="floating-rupee absolute -top-8 left-1/4">
<div class="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg font-bold text-lg">₹</div>
</div>
<!-- Floating Rupee 2 -->
<div class="floating-rupee absolute -bottom-8 right-1/4" style="animation-delay: 0.5s;">
<div class="bg-secondary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg font-bold text-lg">₹</div>
</div>
</div>
</div>
<!-- Right Phone -->
<div class="phone-clay w-24 h-48 bg-surface border-4 border-white/50 rounded-xl relative flex flex-col items-center pt-xs overflow-hidden">
<div class="w-10 h-1.5 bg-surface-variant rounded-full mb-xs"></div>
<div class="w-16 h-28 bg-surface-container-low rounded-lg p-xs flex flex-col gap-xs items-center justify-center">
<span class="material-symbols-outlined text-secondary text-[32px]">download</span>
</div>
</div>
</div>
</div>
<!-- Middle: Heading and Subtext -->
<div class="text-center flex flex-col gap-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Send &amp; Receive Instantly</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                Transfer money to anyone using UPI, QR, or phone number with physical feedback.
            </p>
</div>
<!-- Dot Indicator -->
<div class="flex gap-sm">
<div class="clay-dot"></div>
<div class="clay-dot active"></div>
<div class="clay-dot"></div>
<div class="clay-dot"></div>
</div>
<!-- Bottom: Actions -->
<div class="w-full flex flex-col gap-md">
<button class="clay-button-primary w-full py-md font-label-md text-label-md flex items-center justify-center gap-xs">
                Next
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button class="w-full py-xs font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">
                Skip
            </button>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary opacity-5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary opacity-5 rounded-full blur-[100px]"></div>
</div>
<script>
        // Simple micro-interaction for the "Next" button
        const nextBtn = document.querySelector('.clay-button-primary');
        nextBtn.addEventListener('mousedown', () => {
            nextBtn.style.transform = 'scale(0.95)';
        });
        nextBtn.addEventListener('mouseup', () => {
            nextBtn.style.transform = 'scale(1)';
        });
        nextBtn.addEventListener('mouseleave', () => {
            nextBtn.style.transform = 'scale(1)';
        });
    </script>
</body></html>
