        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #fbf8ff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Claymorphism Elevation 1: Sunken/Inset */
        .clay-inset {
            box-shadow: inset 6px 6px 12px rgba(163, 177, 198, 0.3), 
                        inset -6px -6px 12px rgba(255, 255, 255, 0.8);
        }

        /* Claymorphism Elevation 2: Standard Raised */
        .clay-card {
            box-shadow: 10px 10px 20px rgba(163, 177, 198, 0.25), 
                        -10px -10px 20px rgba(255, 255, 255, 0.7),
                        inset 4px 4px 6px rgba(255, 255, 255, 0.4);
        }

        /* Claymorphism Elevation 3: High/FAB */
        .clay-button-primary {
            background-color: #6c9bcf;
            box-shadow: 8px 8px 16px rgba(108, 155, 207, 0.3), 
                        -8px -8px 16px rgba(255, 255, 255, 0.8),
                        inset 6px 6px 12px rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .clay-button-primary:active {
            transform: scale(0.96);
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.1),
                        inset -6px -6px 12px rgba(255, 255, 255, 0.1);
        }

        .clay-avatar {
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.2), 
                        -6px -6px 12px rgba(255, 255, 255, 0.8),
                        inset 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Soft progress/toggle track */
        .clay-track {
            background: #f4f2ff;
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.2), 
                        inset -4px -4px 8px rgba(255, 255, 255, 0.7);
        }

        .active-tab-clay {
            box-shadow: 4px 4px 8px rgba(163, 177, 198, 0.15), 
                        -4px -4px 8px rgba(255, 255, 255, 0.7),
                        inset 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        /* Custom Checkbox Clay */
        .clay-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: #f4f2ff;
            box-shadow: inset 2px 2px 5px rgba(163, 177, 198, 0.3), 
                        inset -2px -2px 5px rgba(255, 255, 255, 0.8);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .clay-checkbox:checked {
            background: #8af8c5;
            box-shadow: 3px 3px 6px rgba(0, 108, 75, 0.15), 
                        inset 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .clay-checkbox:checked::after {
            content: 'check';
            font-family: 'Material Symbols Outlined';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #002114;
        }

        /* Smooth Hide/Show animation */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<script>
        function toggleSplit(type) {
            const equalBtn = document.getElementById('split-equally');
            const amountBtn = document.getElementById('split-amount');
            
            if (type === 'equal') {
                equalBtn.classList.add('active-tab-clay', 'bg-surface', 'text-primary');
                equalBtn.classList.remove('text-outline');
                amountBtn.classList.remove('active-tab-clay', 'bg-surface', 'text-primary');
                amountBtn.classList.add('text-outline');
            } else {
                amountBtn.classList.add('active-tab-clay', 'bg-surface', 'text-primary');
                amountBtn.classList.remove('text-outline');
                equalBtn.classList.remove('active-tab-clay', 'bg-surface', 'text-primary');
                equalBtn.classList.add('text-outline');
            }
        }

        // Tactile vibration simulation on button presses for mobile
        document.querySelectorAll('button, .clay-card').forEach(el => {
            el.addEventListener('mousedown', () => {
                if (navigator.vibrate) navigator.vibrate(5);
            });
        });
