<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .clay-elevation-1 {
            box-shadow: 8px 8px 16px rgba(163, 177, 198, 0.3), -5px -5px 10px rgba(255, 255, 255, 0.5);
        }

        .clay-elevation-2 {
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), -10px -10px 20px rgba(255, 255, 255, 0.6);
        }

        .clay-elevation-3 {
            box-shadow: 20px 20px 40px rgba(163, 177, 198, 0.4), -12px -12px 24px rgba(255, 255, 255, 0.7);
        }

        .clay-inset {
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.6);
        }

        .clay-button-active:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1);
            transform: scale(0.98);
        }

        .clay-card {
            background: #ffffff;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .clay-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            box-shadow: inset 10px 10px 20px rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        .qr-gradient {
            background: linear-gradient(135deg, #2f6192 0%, #003256 100%);
            -webkit-mask: url('https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=RahulSharmaPayClay') no-repeat center;
            mask: url('https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=RahulSharmaPayClay') no-repeat center;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top Navigation -->
<nav class="w-full max-w-md flex items-center justify-between px-container-padding py-md sticky top-0 z-50 bg-[#F0EDE8]">
<button class="w-10 h-10 flex items-center justify-center rounded-full clay-elevation-1 bg-surface-container-lowest clay-button-active">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-on-surface">My QR Code</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</nav>
<main class="w-full max-w-md flex-1 flex flex-col items-center px-container-padding pb-xl pt-sm">
<!-- Main QR Card -->
<div class="clay-card clay-elevation-3 w-full p-lg flex flex-col items-center mb-xl">
<!-- Profile Section -->
<div class="flex flex-col items-center w-full mb-md">
<div class="w-14 h-14 rounded-full bg-primary-fixed-dim flex items-center justify-center clay-elevation-1 border-4 border-white mb-sm">
<span class="text-on-primary-container font-display text-[24px]">R</span>
</div>
<div class="text-center">
<h2 class="font-title-lg text-title-lg text-on-surface font-bold leading-tight">Rahul Sharma</h2>
<p class="font-label-md text-label-md text-primary">rahul@payclay</p>
</div>
</div>
<!-- QR Code Area -->
<div class="relative w-full aspect-square p-md bg-white rounded-xl shadow-[inset_2px_2px_10px_rgba(0,0,0,0.05)] flex items-center justify-center mb-md">
<div class="w-full h-full max-w-[200px] max-h-[200px] bg-white rounded-lg p-sm">
<div class="w-full h-full bg-contain bg-center bg-no-repeat" data-alt="A clean, minimalist high-contrast QR code generated in a soft clay aesthetic. The pattern is deep navy blue on a crisp white background with rounded square corners. The lighting is bright and even, highlighting the soft 3D inflated look of the white card surface. High-end fintech branding with organic soft shadows." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCvKNkz4NgqlNky3G7JLbnKSnixYE9vngLqFMm30O40Oa_zmgCCV0gY50dWngv3SxP3821iDnTBkmm14uib72sgYwanue5oNKCDb-YvEm4LH-lcwnOJbxfGpZWeB6AI-xjHujmKUjKESAa_cLs6dXZxAoPcrtv4MUf7npJWWX5q-TfF0gk8cJOQO99DDidJpisZDnEdtQ0t8-TfLk0tGM3meh3CeGTYJ3K-wGMREFCY3SJ5hyuEFAXB913guivc9xUIDoa_yZKW7kGI')"></div>
</div>
</div>
<!-- Footer Text -->
<p class="font-label-md text-on-surface-variant">Scan to pay me</p>
</div>
<!-- Amount Section -->
<div class="w-full mb-xl">
<div class="relative flex items-center w-full h-14 px-md rounded-full bg-[#EAE8E3] clay-inset">
<span class="material-symbols-outlined text-primary mr-sm" data-icon="currency_rupee">currency_rupee</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant outline-none" placeholder="Add amount (optional)" type="number"/>
</div>
</div>
<!-- Action Row -->
<div class="w-full grid grid-cols-2 gap-md">
<button class="h-14 flex items-center justify-center gap-xs rounded-full bg-primary text-on-primary clay-elevation-2 clay-button-active font-label-md">
<span class="material-symbols-outlined text-[20px]" data-icon="share">share</span>
                Share QR
            </button>
<button class="h-14 flex items-center justify-center gap-xs rounded-full bg-secondary text-on-secondary clay-elevation-2 clay-button-active font-label-md">
<span class="material-symbols-outlined text-[20px]" data-icon="download">download</span>
                Download
            </button>
</div>
<!-- Subtle Background Animation Container -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">

</div>
</main>
<!-- Bottom Nav Shell (Filtered per rules: suppressed on focused/transactional sub-pages, but included here as top-level identity) -->
<div class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-md pt-sm bg-surface-container/80 backdrop-blur-md rounded-t-3xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant p-sm clay-button-active" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-sm clay-button-active" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-md text-label-md">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-sm clay-button-active" href="#">
<span class="material-symbols-outlined" data-icon="local_offer">local_offer</span>
<span class="font-label-md text-label-md">Offers</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-lg p-sm shadow-[inset_4px_4px_8px_rgba(0,0,0,0.1)]" href="#">
<span class="material-symbols-outlined" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</div>
<script>
        // Simple micro-interaction for the input focus
        const amountInput = document.querySelector('input');
        const inputContainer = amountInput.parentElement;

        amountInput.addEventListener('focus', () => {
            inputContainer.classList.remove('clay-inset');
            inputContainer.classList.add('shadow-[inset_2px_2px_4px_rgba(0,0,0,0.1)]', 'border-primary/20', 'border');
        });

        amountInput.addEventListener('blur', () => {
            inputContainer.classList.add('clay-inset');
            inputContainer.classList.remove('shadow-[inset_2px_2px_4px_rgba(0,0,0,0.1)]', 'border-primary/20', 'border');
        });

        // Interactive "Pop" effect for buttons
        document.querySelectorAll('.clay-button-active').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.95)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
