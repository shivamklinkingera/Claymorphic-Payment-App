<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClayPay - Bank Transfer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .clay-card-level-1 {
            box-shadow: 10px 10px 20px rgba(163, 177, 198, 0.3), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.8);
        }

        .clay-card-level-2 {
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        inset 10px 10px 20px rgba(255, 255, 255, 0.6);
        }

        .clay-input-inset {
            box-shadow: inset 6px 6px 12px rgba(163, 177, 198, 0.4), 
                        inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            border: none;
            outline: none;
        }

        .clay-button-primary {
            box-shadow: 8px 8px 16px rgba(108, 155, 207, 0.4), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.3);
        }

        .clay-button-primary:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.15);
            transform: scale(0.98);
        }

        .clay-tab-active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #6C9BCF;
        }

        .clay-tab-inactive {
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.3), 
                        inset 4px 4px 8px rgba(255, 255, 255, 0.6);
        }

        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
        }
    </style>

                        "on-tertiary-fixed-variant": "#614000",
                        "on-tertiary-container": "#432b00",

                        "surface-container-highest": "#dee0ff",

                        "tertiary-fixed-dim": "#f4bd67",
                        "secondary": "#006c4b",
                        "surface-variant": "#dee0ff",
                        "primary": "#2f6192",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#0d4978",
                        "on-background": "#161a32",
                        "surface-tint": "#2f6192",
                        "on-secondary-fixed": "#002114",
                        "outline-variant": "#c2c7d0",
                        "tertiary": "#7f5604",
                        "secondary-fixed-dim": "#6ddbaa",
                        "on-primary-fixed": "#001d35",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f4f2ff",
                        "surface-container": "#ececff",
                        "secondary-fixed": "#8af8c5",
                        "surface-dim": "#d5d8f9",
                        "outline": "#727780",
                        "on-surface-variant": "#42474f",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0efff",

                    },
                    spacing: {

                        "container-padding": "24px",
                        "sm": "12px",
                        "unit": "4px",
                        "xs": "8px",
                        "xl": "48px",
                        "md": "20px",
                        "gutter": "20px"
                    },
                    fontFamily: {
                        "title-lg": ["Nunito Sans"],
                        "label-md": ["Nunito Sans"],
                        "display": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],

                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "700"}],

                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 flex items-center px-container-padding py-sm w-full bg-[#F0EDE8]/80 backdrop-blur-md">
<button aria-label="Go back" class="w-10 h-10 rounded-full flex items-center justify-center clay-tab-inactive active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="ml-md font-headline-md text-headline-md text-on-surface">Bank Transfer</h1>
</header>
<main class="max-w-md mx-auto px-container-padding mt-md space-y-md">
<!-- Transfer Type Tabs -->
<div class="flex gap-md p-xs bg-surface-container-low rounded-lg clay-card-level-1">
<button class="flex-1 py-sm rounded-lg font-label-md clay-tab-active text-white transition-all">
                IMPS
            </button>
<button class="flex-1 py-sm rounded-lg font-label-md clay-tab-inactive text-on-surface-variant transition-all hover:opacity-80">
                NEFT
            </button>
</div>
<!-- From Account -->
<section class="space-y-sm">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider ml-unit">From</h2>
<div class="clay-card-level-1 bg-surface-container-lowest p-md rounded-lg flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full clay-card-level-2 bg-white flex items-center justify-center overflow-hidden">
<img class="w-8 h-8 object-contain" data-alt="Official logo of State Bank of India with the characteristic blue circle and small notch at the bottom, rendered in a soft-clay, high-gloss 3D style with gentle shadows and highlights, centered on a clean white background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7py9hI-0wREfFsH_YbeAT6-Ph2-QT5YmBmtaBhbHIbC3cRMVaLILsi73o26zBCSBDDa5pojXxBbMyXKwuauluTQHNZxt14FagjWFlOQxt7Om9siYDsYsO9YJualeZevpaka7-22d0N13LYRYlh91IBLtEXxflO6Y98aYzgBGcgevDClFWeDTv3GlBqj2h390ouazza4pEASIK3-3Vzql2bjfARFyIzlPmOKWYgK0fVKAqYLn6qQ46uYhRLLY6fG93FNVtKW3wfTKL"/>
</div>
<div>
<p class="font-title-lg text-title-lg text-on-surface">SBI •••• 4521</p>
<p class="font-body-md text-body-md text-on-surface-variant">Bal: ₹45,230</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</section>
<!-- To Account -->
<section class="space-y-sm">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider ml-unit">To</h2>
<div class="clay-card-level-1 bg-surface-container-lowest p-md rounded-lg space-y-md">
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit">Account Number</label>
<input class="w-full clay-input-inset bg-surface-container-low p-md rounded-lg font-body-md text-on-surface focus:ring-0" placeholder="Account Number" type="text"/>
</div>
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit">Confirm Account Number</label>
<input class="w-full clay-input-inset bg-surface-container-low p-md rounded-lg font-body-md text-on-surface focus:ring-0" placeholder="Confirm Account Number" type="text"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit">IFSC Code</label>
<input class="w-full clay-input-inset bg-surface-container-low p-md rounded-lg font-body-md text-on-surface focus:ring-0 uppercase" placeholder="IFSC Code" type="text"/>
</div>
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit">Beneficiary Name</label>
<input class="w-full clay-input-inset bg-secondary-container/20 p-md rounded-lg font-body-md text-secondary font-bold focus:ring-0" readonly="" type="text" value="Priya Sharma"/>
</div>
</div>
</div>
</section>
<!-- Amount -->
<section class="space-y-sm">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider ml-unit">Amount</h2>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-headline-md text-headline-md text-on-surface">₹</span>
<input class="w-full clay-input-inset bg-surface-container-low pl-xl p-md rounded-lg font-headline-md text-headline-md text-on-surface focus:ring-0" type="text" value="5,000"/>
</div>
</section>
<!-- Remarks -->
<section class="space-y-sm">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider ml-unit">Remarks</h2>
<input class="w-full clay-input-inset bg-surface-container-low p-md rounded-lg font-body-md text-on-surface focus:ring-0" type="text" value="Monthly transfer"/>
</section>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-gradient-to-t from-[#F0EDE8] to-transparent pt-lg">
<button class="w-full max-w-md mx-auto block py-md rounded-full bg-primary-container text-white font-headline-md clay-button-primary transition-all active:scale-95">
            Transfer ₹5,000
        </button>
</div>
<!-- Micro-interaction Script -->
<script>
        // Subtle haptic-like scaling on inputs when focused
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.clay-card-level-1')?.classList.add('scale-[1.01]');
                input.parentElement.closest('.clay-card-level-1')?.style.transition = 'transform 0.3s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.clay-card-level-1')?.classList.remove('scale-[1.01]');
            });
        });

        // Tab Switching Logic
        const tabs = document.querySelectorAll('button.font-label-md');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('clay-tab-active', 'text-white');
                    t.classList.add('clay-tab-inactive', 'text-on-surface-variant');
                });
                tab.classList.add('clay-tab-active', 'text-white');
                tab.classList.remove('clay-tab-inactive', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
