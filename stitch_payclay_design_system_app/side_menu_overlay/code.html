<!-- INTERACTIVE SCRIPT -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const sideMenu = document.getElementById('side-menu');
            const backdrop = document.querySelector('.bg-black\\/40');

            // Handle active states and micro-interactions
            const links = document.querySelectorAll('a, button');
            links.forEach(link => {
                link.addEventListener('touchstart', () => {
                    link.style.transform = 'scale(0.96)';
                });
                link.addEventListener('touchend', () => {
                    link.style.transform = 'scale(1)';
                });
            });

            // Close logic placeholder
            backdrop.addEventListener('click', () => {
                sideMenu.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 1, 1)';
                sideMenu.style.transform = 'translateX(-100%)';
                backdrop.style.opacity = '0';
                backdrop.style.transition = 'opacity 0.3s ease';
                setTimeout(() => {
                    // In a real app, this would remove components from DOM or change state
                    console.log('Menu Closed');
                }, 300);
            });
        });
