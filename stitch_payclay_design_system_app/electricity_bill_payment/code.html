<style>
        body {

        .clay-level-1 {
            background: #F0EDE8;
            box-shadow: 8px 8px 16px rgba(163, 177, 198, 0.4), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.6);
        }

        .clay-level-2 {
            background: #fbf8ff;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        inset 10px 10px 20px rgba(255, 255, 255, 0.6);
        }

        .clay-button-primary {
            background: #2f6192;
            box-shadow: 10px 10px 20px rgba(47, 97, 146, 0.3), 
                        inset 6px 6px 12px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .clay-button-primary:active {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2);
            transform: scale(0.96);
        }

        .clay-input-inset {
            background: #e8e5df;
            box-shadow: inset 6px 6px 12px rgba(163, 177, 198, 0.5), 
                        inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            border: none;
        }

        .clay-chip {
            background: #fbf8ff;
            box-shadow: 4px 4px 8px rgba(163, 177, 198, 0.3), 
                        inset 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button, .clay-level-1, .clay-level-2').forEach(el => {
            el.addEventListener('mousedown', () => {
                el.style.transform = 'scale(0.98)';
            });
            el.addEventListener('mouseup', () => {
                el.style.transform = 'scale(1)';
            });
            el.addEventListener('mouseleave', () => {
                el.style.transform = 'scale(1)';
            });
        });

        // Simple floating animation for the card
        const card = document.querySelector('.clay-level-2');
        if(card) {
            let angle = 0;
            function animate() {
                angle += 0.02;
                const y = Math.sin(angle) * 3;
                card.style.transform = `translateY(${y}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
