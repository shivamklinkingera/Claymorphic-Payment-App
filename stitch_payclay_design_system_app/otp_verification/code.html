<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>PayClay - OTP Verification</title>

                    "surface": "#fbf8ff",

                    "on-error-container": "#93000a",
                    "on-surface-variant": "#42474f",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#007350",

                    "on-secondary-fixed-variant": "#005137",

<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Level 2 Claymorphism - Inflated */
        .clay-level-2 {
            box-shadow: 
                8px 8px 16px rgba(163, 177, 198, 0.4),
                -4px -4px 10px rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            background: #F0EDE8;
        }

        /* Inset Claymorphism - Sunken */
        .clay-inset {
            box-shadow: 
                inset 4px 4px 8px rgba(163, 177, 198, 0.5),
                inset -4px -4px 8px rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            background: #E8E5E0;
        }

        /* Primary Clay Button */
        .clay-button-primary {
            background-color: #2f6192;
            box-shadow: 
                6px 6px 12px rgba(163, 177, 198, 0.4),
                inset 4px 4px 8px rgba(255, 255, 255, 0.3);
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        
        .clay-button-primary:active {
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
        }

        /* Circle Clay Element */
        .clay-circle {
            box-shadow: 
                6px 6px 12px rgba(163, 177, 198, 0.4),
                -4px -4px 8px rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            background: #F0EDE8;
        }

        /* Soft Background Pattern */
        .soft-bg {
            background-image: radial-gradient(circle at 10% 20%, rgba(47, 97, 146, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(47, 97, 146, 0.05) 0%, transparent 40%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface soft-bg selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation -->
<header class="w-full max-w-7xl mx-auto px-container-padding py-xl flex items-center justify-start">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center clay-level-2 active:shadow-inner transition-all hover:scale-105">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding -mt-xl">
<!-- Hero Section -->
<div class="flex flex-col items-center text-center space-y-md mb-lg">
<div class="w-20 h-20 clay-circle flex items-center justify-center mb-xs">
<span class="material-symbols-outlined text-primary text-4xl filled-icon">verified_user</span>
</div>
<div class="space-y-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                    Verify OTP
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs">
                    Sent to <span class="font-bold text-on-surface">+91 98765 43210</span>
</p>
</div>
</div>
<!-- OTP Input Area -->
<div class="flex gap-gutter mb-xl items-center justify-center">
<!-- Box 1 (Filled) -->
<div class="w-[60px] h-[60px] clay-inset flex items-center justify-center">
<span class="font-display text-headline-md text-primary">4</span>
</div>
<!-- Box 2 (Filled) -->
<div class="w-[60px] h-[60px] clay-inset flex items-center justify-center">
<span class="font-display text-headline-md text-primary">7</span>
</div>
<!-- Box 3 (Empty) -->
<div class="w-[60px] h-[60px] clay-level-2 flex items-center justify-center animate-pulse">
<div class="w-1 h-8 bg-primary/20 rounded-full"></div>
</div>
<!-- Box 4 (Empty) -->
<div class="w-[60px] h-[60px] clay-level-2 flex items-center justify-center">
</div>
</div>
<!-- Feedback & Primary Action -->
<div class="w-full max-w-sm flex flex-col items-center space-y-md">
<div class="flex items-center space-y-xs flex-col">
<p class="font-label-md text-label-md text-on-surface-variant">
                    Resend OTP in <span class="text-primary font-bold">00:45</span>
</p>
<button class="font-label-md text-label-md text-primary-fixed-dim hover:underline opacity-50 cursor-not-allowed">
                    Resend OTP
                </button>
</div>
<button class="w-full py-md clay-button-primary opacity-60 cursor-not-allowed font-title-lg text-title-lg text-on-primary">
                Verify
            </button>
</div>
</main>
<!-- Decorative Elements (Optional for context) -->
<div class="fixed top-0 right-0 p-lg pointer-events-none opacity-20">
<div class="w-48 h-48 clay-circle bg-primary-container/20 translate-x-12 -translate-y-12"></div>
</div>
<div class="fixed bottom-0 left-0 p-lg pointer-events-none opacity-20">
<div class="w-64 h-64 clay-circle bg-secondary-container/20 -translate-x-12 translate-y-12"></div>
</div>
<!-- Scripts for micro-interactions -->
<script>
        // Simple scale effect for interactivity visualization
        document.querySelectorAll('.clay-level-2').forEach(el => {
            el.addEventListener('mousedown', () => {
                el.style.transform = 'scale(0.98)';
                el.style.transition = 'transform 0.1s ease';
            });
            el.addEventListener('mouseup', () => {
                el.style.transform = 'scale(1)';
            });
            el.addEventListener('mouseleave', () => {
                el.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
