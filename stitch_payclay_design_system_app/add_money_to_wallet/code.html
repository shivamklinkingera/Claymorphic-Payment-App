<style>
        body {
            background-color: #F0EDE8;
            font-family: 'Nunito Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Level 1 Shadow (Subtle Inset for Inputs/Tracks) */
        .clay-inset {
            box-shadow: 
                inset 8px 8px 16px rgba(163, 177, 198, 0.4), 
                inset -8px -8px 16px rgba(255, 255, 255, 0.8);
        }

        /* Level 2 Shadow (Standard Card) */
        .clay-card {
            background: #ffffff;
            box-shadow: 
                15px 15px 30px rgba(163, 177, 198, 0.4), 
                inset 10px 10px 20px rgba(255, 255, 255, 0.6);
        }

        /* Selected State for Clay Cards */
        .clay-card-selected {
            border: 2px solid #2f6192;
            box-shadow: 
                10px 10px 20px rgba(163, 177, 198, 0.3), 
                inset 8px 8px 16px rgba(255, 255, 255, 0.4);
        }

        /* Level 3 Shadow (Primary Pill Button) */
        .clay-button {
            background-color: #6C9BCF;
            box-shadow: 
                12px 12px 24px rgba(108, 155, 207, 0.4), 
                inset 8px 8px 16px rgba(255, 255, 255, 0.3);
        }

        .clay-button:active {
            box-shadow: 
                inset 6px 6px 12px rgba(0, 0, 0, 0.15),
                inset -6px -6px 12px rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        /* Quick Amount Selected (Pressed Blue Chip) */
        .clay-chip-active {
            background-color: #6C9BCF;
            color: white;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2);
        }

        .clay-chip-inactive {
            background-color: #ffffff;
            color: #42474f;
            box-shadow: 
                4px 4px 8px rgba(163, 177, 198, 0.3), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.6);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .dot-active {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #2f6192;
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.4);
        }
        
        .dot-inactive {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #c2c7d0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex justify-center items-start min-h-screen">
<div class="w-full max-w-md min-h-screen flex flex-col relative px-container-padding py-md">
<!-- TOP: Back arrow + Heading -->
<header class="flex items-center gap-md mb-lg">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full clay-card hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Add Money</h1>
</header>
<!-- BALANCE DISPLAY -->
<div class="mb-xl text-center">
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Current Balance</p>
<p class="font-display text-display text-on-surface">₹12,450.75</p>
</div>
<!-- AMOUNT ENTRY -->
<section class="flex flex-col items-center mb-xl">
<div class="flex items-center justify-center mb-lg">
<span class="text-[32px] font-extrabold text-primary mr-xs">₹</span>
<span class="text-[48px] font-black text-on-surface leading-none">1,000</span>
<span class="w-1 h-12 bg-primary rounded-full ml-xs animate-pulse opacity-50"></span>
</div>
<!-- Quick amounts -->
<div class="flex flex-wrap justify-center gap-sm">
<button class="px-md py-sm rounded-lg font-label-md clay-chip-inactive active:scale-95 transition-all">₹500</button>
<button class="px-md py-sm rounded-lg font-label-md clay-chip-active transition-all">₹1,000</button>
<button class="px-md py-sm rounded-lg font-label-md clay-chip-inactive active:scale-95 transition-all">₹2,000</button>
<button class="px-md py-sm rounded-lg font-label-md clay-chip-inactive active:scale-95 transition-all">₹5,000</button>
<button class="px-md py-sm rounded-lg font-label-md clay-chip-inactive active:scale-95 transition-all">₹10,000</button>
</div>
</section>
<!-- PAYMENT METHOD -->
<section class="flex flex-col gap-md mb-xl">
<h2 class="font-title-lg text-title-lg text-on-surface px-xs">Pay from</h2>
<!-- Option 1: Selected SBI -->
<div class="h-[60px] flex items-center px-md clay-card-selected rounded-lg bg-surface-bright/50 cursor-pointer group">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container/20 text-primary mr-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface font-semibold">SBI Account •••• 4521</p>
</div>
<div class="dot-active"></div>
</div>
<!-- Option 2: Unselected Debit Card -->
<div class="h-[60px] flex items-center px-md clay-card rounded-lg bg-white cursor-pointer group hover:bg-surface-bright/50 transition-colors">

<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface font-semibold">Debit Card •••• 8832</p>
</div>
<div class="dot-inactive"></div>
</div>
<!-- Option 3: Unselected Credit Card -->
<div class="h-[60px] flex items-center px-md clay-card rounded-lg bg-white cursor-pointer group hover:bg-surface-bright/50 transition-colors">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-error-container/30 text-error mr-md">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface font-semibold">Credit Card •••• 1105</p>
</div>
<div class="dot-inactive"></div>
</div>
</section>
<!-- Spacer to push bottom content -->
<div class="flex-grow"></div>
<!-- BOTTOM -->
<footer class="mt-lg flex flex-col gap-sm">
<div class="flex justify-between items-center px-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Adding: <span class="text-on-surface">₹1,000</span></span>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary text-sm" style="font-size: 16px;">verified_user</span>
<span class="font-label-md text-label-md text-secondary font-bold">Processing fee: Free</span>
</div>
</div>
<button class="w-full h-16 rounded-full clay-button flex items-center justify-center font-title-lg text-title-lg text-white transition-all">
                Add ₹1,000
            </button>
</footer>
</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('.clay-chip-inactive, .clay-chip-active').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from siblings
                document.querySelectorAll('.clay-chip-active').forEach(b => {
                    b.classList.remove('clay-chip-active');
                    b.classList.add('clay-chip-inactive');
                });
                // Add active to clicked
                this.classList.remove('clay-chip-inactive');
                this.classList.add('clay-chip-active');
                
                // Update amount visually
                const amountText = this.innerText.replace('₹', '');
                document.querySelector('.text-\\[48px\\]').innerText = amountText;
                document.querySelector('.clay-button').innerText = `Add ₹${amountText}`;
                document.querySelector('.text-on-surface.font-label-md span').innerText = `₹${amountText}`;
            });
        });

        document.querySelectorAll('.clay-card, .clay-card-selected').forEach((card, index, arr) => {
            if(index > 0 || card.classList.contains('cursor-pointer')) {
                card.addEventListener('click', function() {
                    arr.forEach(c => {
                        c.classList.remove('clay-card-selected');
                        c.classList.add('clay-card');
                        const dot = c.querySelector('.dot-active, .dot-inactive');
                        if(dot) {
                            dot.classList.remove('dot-active');
                            dot.classList.add('dot-inactive');
                        }
                    });
                    this.classList.remove('clay-card');
                    this.classList.add('clay-card-selected');
                    const dot = this.querySelector('.dot-inactive');
                    if(dot) {
                        dot.classList.remove('dot-inactive');
                        dot.classList.add('dot-active');
                    }
                });
            }
        });
    </script>
</body></html>
