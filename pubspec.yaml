publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.7.2
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.25
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4
  freezed_annotation: ^2.4.4
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.2
  build_runner: ^2.4.15
  freezed: ^2.5.7

flutter:
  uses-material-design: true
